services:
  - type: web
    name: stretch-creative
    runtime: docker
    dockerfilePath: ./Dockerfile
    disk:
      name: wp-data
      mountPath: /var/lib/mysql
      sizeGB: 1
    envVars:
      - key: WORDPRESS_DB_HOST
        value: "localhost"
      - key: WORDPRESS_DB_USER
        value: "wordpress"
      - key: WORDPRESS_DB_PASSWORD
        value: "wordpress"
      - key: WORDPRESS_DB_NAME
        value: "wordpress"
